<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialBridge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .success {
            color: green;
            margin-top: 10px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Phone Login</h2>

        <div id="phone-section">
            <input type="text" id="phone" placeholder="Enter phone number (+91...)" />
            <button onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otp-section" class="hidden">
            <input type="text" id="otp" placeholder="Enter OTP" />
            <button onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>

        <p id="message"></p>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script type="module">
        // Only ONE socket instance
        const socket = io("http://localhost:5000");

        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAoA3skXYt00nNcV1efQx6aHtZtAhZ5ZqI",
            authDomain: "dialbridge-972c9.firebaseapp.com",
            projectId: "dialbridge-972c9",
            appId: "1:112453752302:web:180ceeb4b00997cfa7eaff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.settings.appVerificationDisabledForTesting = true;

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'invisible'
        });

        let confirmationResult;

        window.sendOTP = async function () {
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message');

            try {
                confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);

                document.getElementById('phone-section').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');

                message.innerText = "OTP sent successfully";
                message.className = "success";
            } catch (error) {
                message.innerText = error.message;
                message.className = "error";
            }
        }

        window.verifyOTP = async function () {
            const otp = document.getElementById('otp').value;
            const message = document.getElementById('message');

            try {
                const result = await confirmationResult.confirm(otp);

                const token = await result.user.getIdToken();
                const userId = result.user.uid;

                // STORE USER ID
                localStorage.setItem("userId", userId);

                // Send token to backend
                await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                // Register user to socket AFTER login
                socket.emit("register", userId);

                message.innerText = "Login Successful";
                message.className = "success";
            } catch (error) {
                message.innerText = "Invalid OTP";
                message.className = "error";
            }
        }

        // Clean connection logging
        socket.on("connect", () => {
            console.log("Socket Connected:", socket.id);
        });

        socket.on("disconnect", () => {
            console.log("Socket Disconnected");
        });
    </script>

</body>

</html>
