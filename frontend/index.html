<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialBridge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* LOGIN */
        #login {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .success {
            color: green;
            margin-top: 10px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        /* APP */
        #app {
            display: none;
            height: 100vh;
        }

        /* FIXED LAYOUT */
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* SIDEBAR (make it smaller + clean) */
        .sidebar {
            width: 100%;
            padding: 20px;
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-weight: bold;
        }

        /* MAIN AREA (center properly) */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            width: 400px;
            height: 90%;
            /* FIX HEIGHT */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HISTORY */
        .history {
            flex: 1;
            overflow-y: auto;
            text-align: left;
        }

        .history h3 {
            color: #333;
        }

        .history div {
            /* padding: 5px; */
            /* background: #e2e8f0; */
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* NUMBER */
        .display {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
        }

        /* KEYPAD */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            /* Space added above keypad */
            margin-bottom: 30px;
            /* Space added below keypad */
        }

        /* KEYS */
        .key {
            width: 70px;
            height: 70px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key:hover {
            background: #94a3b8;
        }

        /* Wrapper for Call and Remove buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        /* CALL BUTTON */
        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #22c55e;
        }

        .remove-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        /* CALL SCREEN */
        .call-screen {
            display: none;
            text-align: center;
        }

        .call-top {
            margin-top: 20px;
        }

        #status {
            font-size: 16px;
            color: #64748b;
            margin: 0 0 5px 0;
            font-weight: bold;
        }

        #callUser {
            font-size: 26px;
            color: #333;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Center Logo Container */
        .call-center {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
        }

        .logo-a {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 60px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Call Actions */
        .call-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .mute {
            background: #cbd5e1;
            color: #333;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .speaker {
            background: #cbd5e1;
            color: #333;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .end {
            background: #cbd5e1;
            color: white;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* Incoming Call */
        .incoming-box {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .incoming-actions {
            margin-top: 10px;
        }

        .accept {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-right: 10px;
        }

        .reject {
            background: red;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <div id="login">
        <h2>Phone Login</h2>

        <div class="login-box">
            <input id="phone" placeholder="Enter phone number (+91...)" />
            <button onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otpBox" class="hidden">
            <input type="text" id="otp" placeholder="Enter OTP" />
            <button onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>

        <p id="msg"></p>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="container">

            <!-- Sidebar -->
            <div class="sidebar">
                <h2>DialBridge</h2>
                <p id="userLabel"></p>
            </div>

            <!-- Main -->
            <div class="main">

                <!-- Dialer -->
                <div id="dialer" class="card">
                    <!-- CALL HISTORY -->
                    <div class="history">
                        <h3>Recent</h3>
                        <div id="historyList">
                            <!-- dynamic -->
                        </div>
                    </div>

                    <!-- PHONE NUMBER DISPLAY -->
                    <div id="number" class="display"></div>

                    <!-- KEYPAD -->
                    <div class="keypad">
                        <div class="key" onclick="press('1')">1</div>
                        <div class="key" onclick="press('2')">2</div>
                        <div class="key" onclick="press('3')">3</div>
                        <div class="key" onclick="press('4')">4</div>
                        <div class="key" onclick="press('5')">5</div>
                        <div class="key" onclick="press('6')">6</div>
                        <div class="key" onclick="press('7')">7</div>
                        <div class="key" onclick="press('8')">8</div>
                        <div class="key" onclick="press('9')">9</div>
                        <div class="key" onclick="press('*')">*</div>
                        <div class="key" onclick="press('0')">0</div>
                        <div class="key" onclick="press('#')">#</div>
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="action-buttons">
                        <!-- CALL BUTTON -->
                        <button class="call-btn" onclick="makeCall()">📞</button>
                        <!-- REMOVE BUTTON -->
                        <button class="remove-btn" onclick="removeNumber()">⌫</button>
                    </div>
                </div>

                <!-- Call Screen -->
                <div id="callScreen" class="card call-screen">

                    <!-- Top Section: Status and Number -->
                    <div class="call-top">
                        <p id="status">Ringing...</p>
                        <h2 id="callUser"></h2>
                    </div>

                    <!-- Center Section: Logo -->
                    <div class="call-center">
                        <div class="logo-a">A</div>
                    </div>

                    <!-- Bottom Section: Actions -->
                    <div class="call-actions">
                        <button class="btn mute">🔇</button>
                        <button class="btn speaker">🔊</button>
                        <button class="btn end" onclick="endCall()">📞</button>
                    </div>

                </div>

            </div>
        </div>

        <!-- Incoming -->
        <div id="incoming" class="incoming-box">
            <p id="incomingNum"></p>
            <div class="incoming-actions">
                <button class="accept" onclick="acceptCall()">Accept</button>
                <button class="reject" onclick="rejectCall()">Reject</button>
            </div>
        </div>

        <audio id="remoteAudio" autoplay></audio>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoA3skXYt00nNcV1efQx6aHtZtAhZ5ZqI",
            authDomain: "dialbridge-972c9.firebaseapp.com",
            projectId: "dialbridge-972c9",
            appId: "1:112453752302:web:180ceeb4b00997cfa7eaff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let socket;
        let myNumber;
        let currentCallUser;

        let peer;
        let localStream;
        let iceQueue = [];
        let isRemoteSet = false;

        // 🔥 TURN + STUN (FINAL CONFIG)
        const ICE_SERVERS = [
            { urls: "stun:stun.l.google.com:19302" },
            {
                urls: "turn:openrelay.metered.ca:80",
                username: "openrelayproject",
                credential: "openrelayproject"
            }
        ];

        // ================= SOCKET =================
        function startApp() {
            socket = io("https://dialbridge.onrender.com", {
                query: { userId: myNumber }
            });

            socket.on("connect", () => {
                socket.emit("register", myNumber);
            });

            setupSocketEvents();
        }

        function setupSocketEvents() {

            socket.on("incoming-call", (data) => {
                window.caller = data.from;
                document.getElementById('incoming').style.display = 'block';
            });

            socket.on("call-ringing", () => {
                showCallScreen("Ringing...");
            });

            socket.on("call-accepted", async () => {
                await startWebRTC(true);
            });

            socket.on("offer", async (offer) => {
                await handleOffer(offer);
            });

            socket.on("answer", async (answer) => {
                await handleAnswer(answer);
            });

            socket.on("ice-candidate", async (candidate) => {
                const ice = new RTCIceCandidate(candidate);

                if (isRemoteSet) {
                    await peer.addIceCandidate(ice);
                } else {
                    iceQueue.push(ice);
                }
            });

            socket.on("call-ended", cleanupCall);
        }

        // ================= CALL FLOW =================
        window.makeCall = () => {
            currentCallUser = "+91" + number;

            socket.emit("call-user", {
                to: currentCallUser,
                from: myNumber
            });
        };

        window.acceptCall = async () => {
            currentCallUser = window.caller;

            socket.emit("call-accepted", {
                to: currentCallUser,
                from: myNumber
            });

            showCallScreen("Connecting...");
            await startWebRTC(false);
        };

        // ================= WEBRTC =================
        async function startWebRTC(isCaller) {

            peer = new RTCPeerConnection({ iceServers: ICE_SERVERS });

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            localStream.getTracks().forEach(track => {
                peer.addTrack(track, localStream);
            });

            peer.ontrack = (event) => {
                const audio = document.getElementById("remoteAudio");
                audio.srcObject = event.streams[0];
                audio.play().catch(() => { });
            };

            peer.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("ice-candidate", {
                        to: currentCallUser,
                        candidate: event.candidate
                    });
                }
            };

            if (isCaller) {
                const offer = await peer.createOffer();
                await peer.setLocalDescription(offer);

                socket.emit("offer", {
                    to: currentCallUser,
                    offer
                });
            }
        }

        // ================= SIGNALING =================
        async function handleOffer(offer) {

            if (!peer) await startWebRTC(false);

            await peer.setRemoteDescription(new RTCSessionDescription(offer));
            isRemoteSet = true;

            iceQueue.forEach(c => peer.addIceCandidate(c));
            iceQueue = [];

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);

            socket.emit("answer", {
                to: currentCallUser,
                answer
            });
        }

        async function handleAnswer(answer) {
            await peer.setRemoteDescription(new RTCSessionDescription(answer));

            isRemoteSet = true;

            iceQueue.forEach(c => peer.addIceCandidate(c));
            iceQueue = [];
        }

        // ================= CLEANUP =================
        function cleanupCall() {
            if (peer) {
                peer.close();
                peer = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
            }

            isRemoteSet = false;
            iceQueue = [];
        }

        // ================= UI =================
        function showCallScreen(status) {
            document.getElementById('dialer').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('status').innerText = status;
        }
    </script>

</body>

</html>
