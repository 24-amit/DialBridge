<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DialBridge</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-body: 'Satoshi', 'Inter', sans-serif;
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
            --color-brand-from: #667eea;
            --color-brand-to: #764ba2;
            --color-bg: #eef0f7;
            --color-surface: #f4f5fb;
            --color-surface-2: #ffffff;
            --color-key-bg: #dde1ef;
            --color-key-hover: #c8cde0;
            --color-key-active: #b4bad2;
            --color-border: oklch(from #667eea l c h / 0.12);
            --color-text: #1e1b2e;
            --color-text-muted: #6b6882;
            --color-text-faint: #a8a6ba;
            --color-divider: #d8daec;
            --color-call: #22c55e;
            --color-call-hover: #16a34a;
            --color-call-ring: oklch(from #22c55e l c h / 0.25);
            --color-del: #dde1ef;
            --color-del-hover: #c8cde0;
            --shadow-card: 0 8px 32px oklch(0.25 0.08 280 / 0.14);
            --shadow-key: 0 2px 6px oklch(0.25 0.08 280 / 0.10);
            --shadow-btn: 0 4px 16px oklch(0.25 0.08 280 / 0.18);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            font-size: var(--text-base);
            min-height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            color: var(--color-text);
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font: inherit;
        }

        /* LOGIN */
        #login {
            background: var(--color-surface-2);
            padding: clamp(var(--space-5), 6vw, var(--space-8));
            border-radius: var(--radius-2xl);
            width: 90%;
            max-width: 300px;
            box-shadow: var(--shadow-card);
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #login h2 {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: var(--space-5);
        }

        #login input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            margin: var(--space-2) 0;
            border: 1.5px solid var(--color-divider);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            background: var(--color-surface);
            color: var(--color-text);
        }

        #login input:focus {
            border-color: var(--color-brand-from);
            box-shadow: 0 0 0 3px oklch(from #667eea l c h / 0.15);
        }

        /* Override for login buttons only */
        #login .login-btn {
            width: 100%;
            margin-top: var(--space-3);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--color-brand-from), var(--color-brand-to));
            color: white;
            font-size: var(--text-sm);
            font-weight: 600;
            box-shadow: var(--shadow-btn);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        #login .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px oklch(from #764ba2 l c h / 0.35);
        }

        #login .login-btn:active {
            transform: scale(0.97);
        }

        .hidden {
            display: none !important;
        }

        .success {
            color: #16a34a;
            font-size: var(--text-xs);
            margin-top: var(--space-2);
        }

        .error {
            color: #dc2626;
            font-size: var(--text-xs);
            margin-top: var(--space-2);
        }

        /* APP */
        #app {
            display: none;
            height: 100dvh;
            width: 100vw;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* header */
        .header {
            position: relative;

            flex-shrink: 0;
            text-align: center;
            padding: clamp(var(--space-3), 2.5vh, var(--space-5)) var(--space-4);
            color: white;
        }

        .header h2 {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .header p {
            font-size: var(--text-xs);
            opacity: 0.8;
            margin-top: var(--space-1);
        }

        /* MAIN AREA (center properly) */
        .main {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 clamp(var(--space-3), 3vw, var(--space-5)) clamp(var(--space-3), 2.5vh, var(--space-5));
        }


        /* CARD */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 400px;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .tab-switch {
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid var(--color-border);
        }

        .tab-switch label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .tab-switch input[type="radio"] {
            transform: scale(1.125);
        }

        /* HISTORY */
        .history {
            left: 0;
            width: 100%;
            min-height: 0;
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            overflow-y: auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 0;
            transition: transform 0.25s ease;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 16px;
        }

        .history::-webkit-scrollbar {
            width: 4px;
        }

        .history::-webkit-scrollbar-thumb {
            background: var(--color-divider);
            border-radius: var(--radius-full);
        }

        .history-header {
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--color-text-muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 12px 16px;
            margin: 0;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-lg);
            background: var(--color-surface-2);
            margin-bottom: var(--space-2);
            cursor: pointer;
            border: 1px solid var(--color-border);
            transition: background var(--transition), transform var(--transition);
        }

        .history-item:hover {
            background: var(--color-key-bg);
        }

        .history-item:active {
            transform: scale(0.98);
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .history-icon.out {
            background: oklch(from #22c55e l c h / 0.12);
        }

        .history-icon.in {
            background: oklch(from #667eea l c h / 0.12);
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-num {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-dur {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-top: 1px;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-6) var(--space-4);
            color: var(--color-text-faint);
            gap: var(--space-2);
        }

        .history-empty svg {
            opacity: 0.4;
        }

        .history-empty p {
            font-size: var(--text-xs);
        }

        /* DIALER BOTTOM */
        .dialer-bottom {
            margin-top: auto;
            flex-shrink: 0;
            z-index: 10;
            background: var(--color-surface-2);
            border-top: 1px solid var(--color-border);
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
            padding: var(--space-4) var(--space-4) clamp(var(--space-4), 3.5vh, var(--space-6));
            display: flex;
            flex-direction: column;
            gap: clamp(var(--space-3), 2.5vh, var(--space-5));
        }

        /* NUMBER BAR */
        .number-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: clamp(48px, 9vh, 62px);
            background: var(--color-bg);
            border: 1.5px solid var(--color-divider);
            border-radius: var(--radius-xl);
            padding: var(--space-2) var(--space-4);
            font-size: clamp(1.3rem, 5vw, 1.75rem);
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: 0.06em;
            overflow: hidden;
            white-space: nowrap;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .number-bar.has-number {
            border-color: var(--color-brand-from);
            box-shadow: 0 0 0 3px oklch(from #667eea l c h / 0.10);
        }

        .number-bar .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--color-brand-from);
            border-radius: 2px;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* KEYPAD */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(var(--space-2), 2.5vw, var(--space-4));
        }

        .key {
            aspect-ratio: 1;
            max-width: 80px;
            max-height: 80px;
            width: 100%;
            margin: 0 auto;
            background: var(--color-key-bg);
            border-radius: var(--radius-full);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1px;
            cursor: pointer;
            user-select: none;
            box-shadow: var(--shadow-key);
            border: 1px solid oklch(from #667eea l c h / 0.08);
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .key:hover {
            background: var(--color-key-hover);
            box-shadow: 0 4px 12px oklch(0.25 0.08 280 / 0.15);
        }

        .key:active {
            background: var(--color-key-active);
            transform: scale(0.91);
            box-shadow: none;
        }

        .key-digit {
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            font-weight: 700;
            color: var(--color-text);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-alpha {
            font-size: clamp(0.45rem, 1.5vw, 0.6rem);
            font-weight: 600;
            color: var(--color-text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
        }

        /* ACTION ROW */
        .action-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(var(--space-8), 12vw, var(--space-10));
        }

        .call-btn {
            width: clamp(60px, 16vw, 72px);
            height: clamp(60px, 16vw, 72px);
            border-radius: var(--radius-full);
            background: var(--color-call);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 0 var(--color-call-ring), var(--shadow-btn);
            transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
        }

        .call-btn:hover {
            background: var(--color-call-hover);
            transform: scale(1.06);
            box-shadow: 0 0 0 6px var(--color-call-ring), var(--shadow-btn);
        }

        .call-btn:active {
            transform: scale(0.94);
        }

        .call-btn svg {
            width: clamp(24px, 6vw, 30px);
            height: clamp(24px, 6vw, 30px);
        }

        .del-btn {
            width: clamp(52px, 14vw, 62px);
            height: clamp(52px, 14vw, 62px);
            border-radius: var(--radius-full);
            background: var(--color-del);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid oklch(from #667eea l c h / 0.08);
            box-shadow: var(--shadow-key);
            transition: background var(--transition), transform var(--transition);
        }

        .del-btn:hover {
            background: var(--color-del-hover);
        }

        .del-btn:active {
            transform: scale(0.92);
            background: var(--color-key-active);
        }

        .del-btn svg {
            width: clamp(20px, 5vw, 26px);
            height: clamp(20px, 5vw, 26px);
        }

        /* CALL SCREEN */
        #callScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .call-screen-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: clamp(var(--space-5), 5vh, var(--space-8)) var(--space-5);
            width: 100%;
        }

        .call-avatar-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-ring {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;

            border: 2px solid rgba(255, 255, 255, 0.15);

            animation: pulseRing 2.8s infinite;
        }

        .call-avatar {
            width: 145px;
            height: 145px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                linear-gradient(135deg,
                    #7c3aed,
                    #06b6d4);

            box-shadow:
                0 10px 40px rgba(124, 58, 237, 0.35),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);

            animation:
                avatarFloat 4s ease-in-out infinite;
        }

        .avatar-glow {
            position: absolute;
            inset: -40%;

            background:
                radial-gradient(circle,
                    rgba(255, 255, 255, 0.18),
                    transparent 65%);

            animation: rotateGlow 8s linear infinite;
        }

        .avatar-shine {
            position: absolute;
            top: -30%;
            left: -60%;

            width: 60%;
            height: 200%;

            background:
                linear-gradient(to right,
                    transparent,
                    rgba(255, 255, 255, 0.16),
                    transparent);

            transform: rotate(25deg);

            animation: shineMove 5s linear infinite;
        }

        .avatar-pattern {
            position: absolute;
            inset: 0;

            background-image:
                radial-gradient(rgba(255, 255, 255, 0.08) 2px,
                    transparent 2px);

            background-size: 18px 18px;
        }

        .avatar-icon {
            position: relative;
            z-index: 2;

            font-size: 58px;

            filter:
                drop-shadow(0 4px 10px rgba(0, 0, 0, 0.25));
        }

        @keyframes avatarFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes rotateGlow {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shineMove {

            from {
                left: -60%;
            }

            to {
                left: 140%;
            }
        }

        @keyframes pulseRing {

            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            70% {
                transform: scale(1.08);
                opacity: 0;
            }

            100% {
                transform: scale(1.08);
                opacity: 0;
            }
        }

        .call-name {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: 700;
            color: var(--color-text);
        }

        .call-status {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            font-weight: 500;
            margin-top: var(--space-1);
        }

        .call-actions {
            display: flex;
            gap: clamp(var(--space-5), 8vw, var(--space-8));
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-2);
        }

        .action-circle {
            width: clamp(52px, 14vw, 64px);
            height: clamp(52px, 14vw, 64px);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition), background var(--transition);
        }

        .action-circle:hover {
            transform: scale(1.08);
        }

        .action-circle:active {
            transform: scale(0.92);
        }

        .action-circle.mute {
            background: var(--color-key-bg);
        }

        .action-circle.speaker {
            background: var(--color-key-bg);
        }

        .action-circle.end {
            background: #ef4444;
            box-shadow: 0 4px 16px oklch(from #ef4444 l c h / 0.35);
        }

        .action-circle svg {
            width: clamp(20px, 5vw, 26px);
            height: clamp(20px, 5vw, 26px);
        }

        .action-circle.end svg {
            color: white;
        }

        .action-label {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            font-weight: 500;
        }

        /* INCOMING CALL */
        .incoming-box {
            display: none;
            position: fixed;
            bottom: clamp(var(--space-4), 3vh, var(--space-6));
            right: clamp(var(--space-4), 3vw, var(--space-6));
            background: #1e1b2e;
            color: white;
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-xl);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            z-index: 200;
            min-width: 200px;
            max-width: 90vw;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .incoming-label {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: var(--space-1);
        }

        .incoming-num {
            font-size: var(--text-base);
            font-weight: 700;
        }

        .incoming-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
        }

        .inc-btn {
            flex: 1;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            transition: transform var(--transition);
        }

        .inc-btn:active {
            transform: scale(0.96);
        }

        .inc-btn.accept {
            background: var(--color-call);
            color: white;
        }

        .inc-btn.reject {
            background: #ef4444;
            color: white;
        }


        @media (max-height: 620px) {
            .history {
                max-height: 55px;
            }

            .dialer-bottom {
                gap: var(--space-2);
                padding: var(--space-3) var(--space-4);
            }

            .number-bar {
                min-height: 40px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 340px) {
            .key {
                max-width: 66px;
            }
        }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <div id="login">
        <h2>Phone Login</h2>
        <div class="login-box">
            <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10" inputmode="numeric"
                autofocus>
            <button class="login-btn" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otpBox" class="hidden">
            <input type="tel" id="otp" placeholder="Enter OTP" inputmode="numeric" autocomplete="one-time-code"
                autofocus>
            <button class="login-btn" onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>
        <p id="msg"></p>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="container">
            <!-- Sidebar -->
            <div class="header">
                <h2>DialBridge</h2>
                <p id="userLabel"></p>
                <div style="position:absolute; left:15px; top:15px;">
                    <button onclick="logout()" style="
        padding:6px 10px;
        border-radius:8px;

    <!-- ======== SCRIPTS ======== -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, doc, getDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getDatabase, ref, set, onDisconnect, get, update, onValue }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoA3skXYt00nNcV1efQx6aHtZtAhZ5ZqI",
            authDomain: "dialbridge-972c9.firebaseapp.com",
            projectId: "dialbridge-972c9",
            appId: "1:112453752302:web:180ceeb4b00997cfa7eaff"
        };

        const formatPhone = (num) => {
            return num ? num.replace(/^\+91\s?/, "") : "";
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const getCallStateRef = (num) => ref(rtdb, "call_state/" + num);

        let socket, myNumber, currentCallUser, SESSION_ID = crypto.randomUUID(), number = "";
        let callStartTime, callSeconds, callTimerInterval, caller;
        let peer, localStream, iceQueue = [], isRemoteSet = false;
        let isMuted = false;
        let isSpeakerOn = false;
        let CALL_STATE = "IDLE"; // IDLE, CALLING, RINGING, IN_CALL

        const deleteBtn = document.getElementById("deleteBtn");
        let holdTimer = null;
        let isHolding = false;

        const Store = {
            setItem: (k, v) => localStorage.setItem(k, v),
            getItem: (k) => localStorage.getItem(k),
            removeItem: (k) => localStorage.removeItem(k)
        };

        window.onload = () => {
            const savedUser = Store.getItem("userNumber");

            if (savedUser) {
                myNumber = savedUser;
                startApp(); // auto login
                return;
            }

            const phoneInput = document.getElementById("phone");

            setTimeout(() => {
                phoneInput.focus();
            }, 300);

            // ENTER KEY SUPPORT
            document.getElementById("phone").addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    sendOTP();
                }
            });

            document.getElementById("otp").addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    verifyOTP();
                }
            });
        };

        window.logout = async () => {
            if (!myNumber) return;

            const userStatusRef = ref(rtdb, "status/" + myNumber);

            await set(userStatusRef, {
                online: false,
                lastSeen: Date.now()
            });

            Store.removeItem("userNumber");
            location.reload();
        };

        window.switchTab = (tab) => {
            const history = document.getElementById("historySection");
            const dialpad = document.getElementById("dialpadSection");

            if (!history || !dialpad) return;

            if (tab === "history") {
                history.style.display = "block";
                dialpad.style.display = "none";
            } else {
                history.style.display = "none";
                dialpad.style.display = "flex";
            }
        };

        function generateAvatar(number) {

            const colors = [
                ["#7c3aed", "#06b6d4"],
                ["#ff6b6b", "#f59e0b"],
                ["#06b6d4", "#3b82f6"],
                ["#10b981", "#14b8a6"],
                ["#ec4899", "#8b5cf6"],
                ["#f97316", "#ef4444"]
            ];
            let hash = 0;

            for (let i = 0; i < number.length; i++) {
                hash += number.charCodeAt(i);
            }
            const theme = colors[hash % colors.length];

            const avatar = document.getElementById("callAvatar");

            avatar.style.background = `linear-gradient(135deg, ${theme[0]}, ${theme[1]})`;

            document.getElementById("avatarLetter").innerText = "📞";
        }

        const UI = {
            showDialer() {
                document.getElementById('dialer').style.display = 'flex';
                document.getElementById('callScreen').style.display = 'none';
            },
            showCallScreen() {
                document.getElementById('dialer').style.display = 'none';
                document.getElementById('callScreen').style.display = 'flex';
            }
        };

        const ICE_SERVERS = [
            {
                urls: "stun:stun.relay.metered.ca:80",
            },
            {
                urls: "turn:global.relay.metered.ca:80",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turn:global.relay.metered.ca:80?transport=tcp",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turn:global.relay.metered.ca:443",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turns:global.relay.metered.ca:443?transport=tcp",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            }
        ];

        /* ---- LOGIN ---- */
        window.sendOTP = () => {
            let phone = document.getElementById('phone').value.trim().replace(/\D/g, "");
            const message = document.getElementById('msg');

            if (phone.length !== 10) {
                message.innerText = "Enter valid 10-digit phone number";
                message.className = "error";
                return;
            }

            Store.setItem("tempPhone", "+91" + phone);

            document.querySelector('.login-box').classList.add('hidden');
            document.getElementById('otpBox').classList.remove('hidden');

            message.innerText = "OTP sent";
            message.className = "success";

            setTimeout(() => {
                const otpInput = document.getElementById("otp");
                otpInput.focus();
            }, 200);
        };

        window.verifyOTP = async () => {
            const otp = document.getElementById('otp').value;
            const message = document.getElementById('msg');

            try {
                if (otp === "123456") {
                    myNumber = Store.getItem("tempPhone");
                    if (!myNumber) {
                        throw new Error("Phone number missing");
                    }
                    Store.setItem("userNumber", myNumber);

                    message.innerText = "Login Successful";
                    message.className = "success";

                    setTimeout(() => {
                        startApp();
                    }, 200);
                } else {
                    throw new Error("Invalid OTP");
                }
            } catch (error) {
                message.innerText = error.message;
                message.className = "error";
            }
        };

        /* ---- APP START ---- */
        async function startApp() {
            myNumber = myNumber || Store.getItem("userNumber");

            const userStatusRef = ref(rtdb, "status/" + myNumber);
            const sessionRef = ref(rtdb, "sessions/" + myNumber);

            switchTab("dialpad");

            await set(userStatusRef, {
                online: true,
                lastSeen: Date.now()
            });

            await set(sessionRef, {
                sessionId: SESSION_ID,
                updatedAt: Date.now()
            });

            onValue(sessionRef, (snap) => {
                const data = snap.val();

                if (!data) return;

                if (data.sessionId !== SESSION_ID) {
                    alert("Your account opened on another device");

                    cleanupCall();
                    stopTimer();

                    Store.removeItem("userNumber");

                    if (socket) {
                        socket.disconnect();
                    }
                    location.reload();
                }
            });

            onDisconnect(userStatusRef).set({
                online: false,
                lastSeen: Date.now()
            });

            setInterval(() => {
                update(userStatusRef, {
                    lastSeen: Date.now()
                });
            }, 30000);

            document.getElementById("userLabel").innerText = "You: +91 " + formatPhone(myNumber);
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            enableDialpadKeyboard();

            loadCallHistory(myNumber);

            socket = io("https://dialbridge.onrender.com", {
                query: { userId: myNumber },
                transports: ["websocket"]
            });

            socket.on("connect", () => {
                socket.emit("register", myNumber);
            });

            setupSocketEvents();
        }

        /* ---- HISTORY ---- */
        async function loadCallHistory(userNumber) {
            const q = query(
                collection(db, "call_logs"),
                where("participants", "array-contains", userNumber)
            );
            onSnapshot(q, (snap) => {
                const historyHTML = [];

                snap.forEach(doc => {
                    const data = doc.data();

                    const isOutgoing = data.caller === userNumber;

                    historyHTML.push({
                        num: isOutgoing ? data.receiver : data.caller,
                        dur: data.duration,
                        type: isOutgoing ? "out" : "in",
                        ts: data.timestamp?.toDate()
                    });
                });
                historyHTML.sort((a, b) => b.ts - a.ts);

                const list = document.getElementById("historyList");

                if (!historyHTML.length) {
                    list.innerHTML = `
<div class="history-empty">
    <p>No recent calls</p>
</div>`;
                    return;
                }

                list.innerHTML = historyHTML.map(item => {
                    const formatted = item.ts
                        ? new Date(item.ts).toLocaleString()
                        : "Just now";

                    return `
    <div class="history-item" onclick="dialFromHistory('${item.num}')">
        <div class="history-icon ${item.type}">
            ${item.type === "out" ? "↗" : "↙"}
        </div>
        <div class="history-info">
            <div class="history-num">+91 ${formatPhone(item.num)}</div>
            <div class="history-dur">
                ${item.dur}s • ${formatted}
            </div>
        </div>
    </div>
    `;
                }).join("");
            });
        }

        window.dialFromHistory = (num) => {
            number = num.replace("+91", "");
            updateDisplay();

            switchTab("dialpad");

            document.querySelector("input[value='dialpad']").checked = true;
        };

        /* ---- SOCKET EVENTS ---- */
        function setupSocketEvents() {
            socket.on("incoming-call", (data) => {

                if (CALL_STATE !== "IDLE") {
                    socket.emit("call-rejected", { to: data.from });
                    return;
                }
                CALL_STATE = "RINGING";

                caller = data.from;
                document.getElementById('incomingNum').innerText = "+91 " + formatPhone(data.from);
                document.getElementById('incoming').style.display = 'block';
            });

            socket.on("call-ringing", () => {
                showCallScreen("Ringing...");
            });

            socket.on("call-accepted", async () => {
                CALL_STATE = "IN_CALL";
                showCallScreen("Connecting...");
                await startWebRTC(true);
            });

            socket.on("call-rejected", () => {
                document.getElementById('status').innerText = "Call Rejected";
                setTimeout(resetUI, 500);
            });

            socket.on("offer", async (offer) => {
                await handleOffer(offer);
            });

            socket.on("answer", async (answer) => {
                await handleAnswer(answer);
            });

            socket.on("remote-mute-state", (data) => {
                const indicator = document.getElementById("remoteMuteIndicator");

                if (!indicator) return;

                if (data.muted) {
                    indicator.innerText = "Microphone muted";
                    indicator.style.display = "block";
                } else {
                    indicator.style.display = "none";
                }
            });

            socket.on("ice-candidate", async (candidate) => {
                const ice = new RTCIceCandidate(candidate);

                if (isRemoteSet) {
                    await peer.addIceCandidate(ice);
                } else {
                    iceQueue.push(ice);
                }
            });

            socket.on("call-ended", async () => {
                CALL_STATE = "IDLE";

                cleanupCall();
                stopTimer();
                document.getElementById('status').innerText = "Call Ended";

                const duration = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;

                if (currentCallUser) {
                    await saveCallLog(currentCallUser, myNumber, duration);
                }

                setTimeout(() => {
                    resetUI();
                }, 200);
            });

            socket.on("user-offline", () => {
                document.getElementById('status').innerText = "User is offline";
                setTimeout(resetUI, 2000);
            });

            socket.on("reconnect", () => {
                console.log("Reconnected");

                socket.emit("register", myNumber);

                if (CALL_STATE !== "IDLE") {
                    cleanupCall();
                    stopTimer();
                    resetUI();
                    CALL_STATE = "IDLE";
                }
            });
        }

        /* ---- TIMER ---- */
        function startTimer() {
            callSeconds = 0;

            callTimerInterval = setInterval(() => {
                callSeconds++;
                document.getElementById('status').innerText = formatTime(callSeconds);
            }, 1000);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s < 10 ? "0" : ""}${s}`;
        }

        function stopTimer() {
            clearInterval(callTimerInterval);
            callSeconds = 0;
        }

        /* ---- DIALER ---- */
        function updateDisplay() {
            const text = document.getElementById('numberText');
            const cursor = document.getElementById('cursor');
            const bar = document.getElementById('number');
            if (number) {
                text.innerText = "+91 " + number;
                cursor.style.display = 'inline-block';
                bar.classList.add('has-number');
            } else {
                text.innerText = "";
                cursor.style.display = 'none';
                bar.classList.remove('has-number');
            }
        }

        window.press = (n) => {
            if (number.length >= 10) return;

            number += n;
            updateDisplay();
        };

        window.removeNumber = () => {
            if (!number) return;
            number = number.slice(0, -1);
            updateDisplay();
        };

        deleteBtn.addEventListener("click", () => {
            if (!isHolding) {
                removeNumber();
            }
        });

        // DIALPAD KEYBOARD CONTROL
        let backspaceStart = 0;

        function focusDialpad() {
            document.body.focus();
        }

        function enableDialpadKeyboard() {
            document.body.setAttribute("tabindex", "0");

            setTimeout(() => {
                focusDialpad();
            }, 300);

            document.addEventListener("click", () => {
                focusDialpad();
            });

            document.addEventListener("keydown", (e) => {
                if (e.repeat && e.key !== "Backspace") return;

                if (/^[0-9]$/.test(e.key)) {
                    press(e.key);
                    return;
                }

                if (e.key === "*") {
                    press("*");
                    return;
                }

                if (e.key === "#") {
                    press("#");
                    return;
                }

                if (e.key === "Enter") {
                    e.preventDefault();

                    if (number.length === 10) {
                        makeCall();
                    } else {
                        alert("Enter valid 10-digit number");
                    }
                    return;
                }

                if (e.key === "Backspace") {
                    e.preventDefault();

                    if (e.repeat) return;

                    backspaceStart = Date.now();
                    removeNumber();
                }
            });

            document.addEventListener("keyup", (e) => {
                if (e.key !== "Backspace") return;

                const holdDuration = Date.now() - backspaceStart;

                if (holdDuration >= 500) {
                    number = "";
                    updateDisplay();
                }
            });
        }

        // START HOLD
        deleteBtn.addEventListener("pointerdown", (e) => {
            e.preventDefault();

            isHolding = false;

            holdTimer = setTimeout(() => {
                number = "";
                updateDisplay();
                isHolding = true;
            }, 500);
        });

        // END HOLD
        deleteBtn.addEventListener("pointerup", () => {
            clearTimeout(holdTimer);
        });

        /* ---- CALL FLOW ---- */
        window.makeCall = async () => {
            if (number.length !== 10) {
                alert("Enter valid 10-digit number");
                return;
            }
            const target = "+91" + number;

            try {
                const statusSnap = await get(ref(rtdb, "status/" + target));
                const status = statusSnap.val();

                if (!statusSnap.exists()) {
                    alert("User not registered");
                    return;
                }

                if (!status?.online) {
                    alert("User is offline");
                    return;
                }

                callStartTime = Date.now();
                currentCallUser = target;

                CALL_STATE = "CALLING";

                socket.emit("call-user", {
                    to: currentCallUser,
                    from: myNumber
                });

                showCallScreen("Calling...");

            } catch (err) {
                console.error(err);
                alert("Error checking user");
            }
        };

        window.acceptCall = async () => {
            CALL_STATE = "IN_CALL";

            currentCallUser = caller;

            socket.emit("call-accepted", {
                to: currentCallUser,
                from: myNumber
            });

            document.getElementById('incoming').style.display = 'none';

            showCallScreen("Connecting...");
            await startWebRTC(false);

            const audio = document.getElementById("remoteAudio");

            try {
                await audio.play();
            } catch (e) {
                console.log(e);
            }
        };

        window.rejectCall = () => {
            socket.emit("call-rejected", {
                to: caller,
                from: myNumber
            });

            document.getElementById('incoming').style.display = 'none';
            CALL_STATE = "IDLE";
        };

        window.endCall = async () => {
            if (CALL_STATE === "IDLE") return;

            CALL_STATE = "IDLE";

            socket.emit("end-call", { to: currentCallUser, from: myNumber });

            const duration = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;

            if (currentCallUser) {
                await saveCallLog(myNumber, currentCallUser, duration);
            }

            cleanupCall();
            stopTimer();
            document.getElementById('status').innerText = "Call Ended";

            setTimeout(() => {
                resetUI();
            }, 200);
        };

        window.toggleMute = () => {
            if (!localStream) return;

            const audioTrack = localStream.getAudioTracks()[0];

            if (!audioTrack) return;

            isMuted = !isMuted;
            audioTrack.enabled = !isMuted;
            const muteBtn = document.getElementById("muteBtn");

            if (isMuted) {
                muteBtn.style.background = "#ef4444";
                document.querySelector("#muteBtn svg").style.color = "white";
            } else {
                muteBtn.style.background = "";
                document.querySelector("#muteBtn svg").style.color = "var(--color-text-muted)";
            }

            // SEND MUTE STATE
            socket.emit("mute-state-changed", {
                to: currentCallUser,
                muted: isMuted
            });
        };

        window.toggleSpeaker = async () => {
            const audio = document.getElementById("remoteAudio");

            if (!audio) return;

            isSpeakerOn = !isSpeakerOn;
            /*
                MOBILE SUPPORT
                ----------------
                setSinkId works mainly on Chrome desktop.
                Most mobile browsers DO NOT allow changing output device.
            */
            try {
                // DESKTOP / CHROME
                if (typeof audio.setSinkId === "function") {
                    if (isSpeakerOn) {
                        // speaker device
                        await audio.setSinkId("default");
                    } else {
                        // earpiece/headphone/default route
                        await audio.setSinkId("communications");
                    }
                }
            } catch (err) {
                console.log("Speaker switch not supported:", err);
            }
            const btn = document.getElementById("speakerBtn");

            if (isSpeakerOn) {
                btn.style.background = "#22c55e";
                btn.querySelector("svg").style.color = "white";
            } else {
                btn.style.background = "";
                btn.querySelector("svg").style.color = "var(--color-text-muted)";
            };
        };

        /* ---- WEBRTC ---- */
        async function startWebRTC(isCaller) {
            if (peer) cleanupCall();

            try {
                peer = new RTCPeerConnection({ iceServers: ICE_SERVERS });

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    alert("Microphone permission denied");
                    return;
                }

                localStream.getTracks().forEach(track => {
                    peer.addTrack(track, localStream);
                });

                peer.ontrack = async (event) => {
                    const audio = document.getElementById("remoteAudio");
                    audio.srcObject = event.streams[0];
                    // audio.play().catch(() => { });
                    audio.volume = 1;

                    try {
                        await audio.play();
                    } catch (err) {
                        console.log(err);
                    }
                };

                peer.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit("ice-candidate", {
                            to: currentCallUser,
                            candidate: event.candidate
                        });
                    }
                };

                peer.onconnectionstatechange = () => {
                    if (peer.connectionState === "connected") {
                        callStartTime = Date.now();
                        startTimer();
                    }

                    if (
                        CALL_STATE !== "IDLE" &&
                        (peer.connectionState === "closed" ||
                            peer.connectionState === "failed")
                    ) {
                        cleanupCall();
                        stopTimer();
                        resetUI();

                        CALL_STATE = "IDLE";
                    }
                };

                if (isCaller) {
                    const offer = await peer.createOffer();
                    await peer.setLocalDescription(offer);

                    socket.emit("offer", {
                        to: currentCallUser,
                        offer
                    });
                }

            } catch (err) {
                console.error("WebRTC error:", err);
            }
        }

        async function handleOffer(offer) {

            if (!peer) await startWebRTC(false);

            await peer.setRemoteDescription(new RTCSessionDescription(offer));
            isRemoteSet = true;

            iceQueue.forEach(c => peer.addIceCandidate(c));
            iceQueue = [];

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);

            socket.emit("answer", {
                to: currentCallUser,
                answer
            });
        }

        async function handleAnswer(answer) {
            await peer.setRemoteDescription(new RTCSessionDescription(answer));

            isRemoteSet = true;

            iceQueue.forEach(c => peer.addIceCandidate(c));
            iceQueue = [];
        }

        function cleanupCall() {
            if (peer) {
                peer.close();
                peer = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
            }

            isRemoteSet = false;
            iceQueue = [];

            const audio = document.getElementById("remoteAudio");

            if (audio) {
                audio.pause();
                audio.srcObject = null;
            }

            currentCallUser = null;
            caller = null;

            isMuted = false;
            const muteBtn = document.getElementById("muteBtn");
            const remoteIndicator = document.getElementById("remoteMuteIndicator");

            if (muteBtn) {
                muteBtn.style.background = "";
                document.querySelector("#muteBtn svg").style.color = "var(--color-text-muted)";
            }

            if (remoteIndicator) {
                remoteIndicator.style.display = "none";
            }
        }

        /* ---- UI ---- */
        function showCallScreen(status) {
            UI.showCallScreen();

            document.getElementById('status').innerText = status;

            const user = currentCallUser || caller || number;

            generateAvatar(user);

            document.getElementById('callUser').innerText = "+91 " + formatPhone(user);

            document.getElementById("remoteMuteIndicator").style.display = "none";
        }

        function resetUI() {

            document.getElementById('dialer').style.display = 'flex';
            document.getElementById('callScreen').style.display = 'none';

            document.getElementById('incoming').style.display = 'none';

            document.getElementById('status').innerText = "Ringing...";

            const remoteAudio = document.getElementById("remoteAudio");

            if (remoteAudio) {
                remoteAudio.pause();
                remoteAudio.srcObject = null;
            }

            isSpeakerOn = false;

            const speakerBtn = document.getElementById("speakerBtn");

            if (speakerBtn) {
                speakerBtn.style.background = "";
                speakerBtn.querySelector("svg").style.color =
                    "var(--color-text-muted)";
            }

            number = "";
            updateDisplay();
        }

        async function saveCallLog(caller, receiver, duration) {
            await addDoc(collection(db, "call_logs"), {
                caller,
                receiver,
                participants: [caller, receiver],
                duration,
                timestamp: serverTimestamp()
            });
        }
    </script>

</body>

</html>
