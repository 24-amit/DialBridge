<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DialBridge</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-body: 'Satoshi', 'Inter', sans-serif;
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
            --color-brand-from: #667eea;
            --color-brand-to: #764ba2;
            --color-bg: #eef0f7;
            --color-surface: #f4f5fb;
            --color-surface-2: #ffffff;
            --color-key-bg: #dde1ef;
            --color-key-hover: #c8cde0;
            --color-key-active: #b4bad2;
            --color-border: oklch(from #667eea l c h / 0.12);
            --color-text: #1e1b2e;
            --color-text-muted: #6b6882;
            --color-text-faint: #a8a6ba;
            --color-divider: #d8daec;
            --color-call: #22c55e;
            --color-call-hover: #16a34a;
            --color-call-ring: oklch(from #22c55e l c h / 0.25);
            --color-del: #dde1ef;
            --color-del-hover: #c8cde0;
            --shadow-card: 0 8px 32px oklch(0.25 0.08 280 / 0.14);
            --shadow-key: 0 2px 6px oklch(0.25 0.08 280 / 0.10);
            --shadow-btn: 0 4px 16px oklch(0.25 0.08 280 / 0.18);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            font-size: var(--text-base);
            min-height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            color: var(--color-text);
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font: inherit;
        }

        /* LOGIN */
        #login {
            background: var(--color-surface-2);
            padding: clamp(var(--space-5), 6vw, var(--space-8));
            border-radius: var(--radius-2xl);
            width: 90%;
            max-width: 300px;
            box-shadow: var(--shadow-card);
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #login h2 {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: var(--space-5);
        }

        #login input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            margin: var(--space-2) 0;
            border: 1.5px solid var(--color-divider);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            background: var(--color-surface);
            color: var(--color-text);
        }

        #login input:focus {
            border-color: var(--color-brand-from);
            box-shadow: 0 0 0 3px oklch(from #667eea l c h / 0.15);
        }

        /* Override for login buttons only */
        #login .login-btn {
            width: 100%;
            margin-top: var(--space-3);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--color-brand-from), var(--color-brand-to));
            color: white;
            font-size: var(--text-sm);
            font-weight: 600;
            box-shadow: var(--shadow-btn);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        #login .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px oklch(from #764ba2 l c h / 0.35);
        }

        #login .login-btn:active {
            transform: scale(0.97);
        }

        .hidden {
            display: none !important;
        }

        .success {
            color: #16a34a;
            font-size: var(--text-xs);
            margin-top: var(--space-2);
        }

        .error {
            color: #dc2626;
            font-size: var(--text-xs);
            margin-top: var(--space-2);
        }

        /* APP */
        #app {
            display: none;
            height: 100dvh;
            width: 100vw;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* header */
        .header {
            position: relative;

            flex-shrink: 0;
            text-align: center;
            padding: clamp(var(--space-3), 2.5vh, var(--space-5)) var(--space-4);
            color: white;
        }

        .header h2 {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .header p {
            font-size: var(--text-xs);
            opacity: 0.8;
            margin-top: var(--space-1);
        }

        /* MAIN AREA (center properly) */
        .main {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 clamp(var(--space-3), 3vw, var(--space-5)) clamp(var(--space-3), 2.5vh, var(--space-5));
        }


        /* CARD */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 400px;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
        }

        .tab-switch {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        .tab-switch label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .tab-switch input[type="radio"] {
            transform: scale(1.125);
        }

        /* HISTORY */
        .history {
            left: 0;
            width: 100%;
            min-height: 0;
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            overflow-y: auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: var(--space-4) var(--space-4) var(--space-3);
            transition: transform 0.25s ease;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-2) var(--space-4);
        }

        .history::-webkit-scrollbar {
            width: 4px;
        }

        .history::-webkit-scrollbar-thumb {
            background: var(--color-divider);
            border-radius: var(--radius-full);
        }

        .history-header {
            position: sticky;
            top: 0;
            z-index: 5;
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--color-text-muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: var(--space-3) var(--space-4);
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-lg);
            background: var(--color-surface-2);
            margin-bottom: var(--space-2);
            cursor: pointer;
            border: 1px solid var(--color-border);
            transition: background var(--transition), transform var(--transition);
        }

        .history-item:hover {
            background: var(--color-key-bg);
        }

        .history-item:active {
            transform: scale(0.98);
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .history-icon.out {
            background: oklch(from #22c55e l c h / 0.12);
        }

        .history-icon.in {
            background: oklch(from #667eea l c h / 0.12);
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-num {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-dur {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-top: 1px;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-6) var(--space-4);
            color: var(--color-text-faint);
            gap: var(--space-2);
        }

        .history-empty svg {
            opacity: 0.4;
        }

        .history-empty p {
            font-size: var(--text-xs);
        }

        /* DIALER BOTTOM */
        .dialer-bottom {
            margin-top: auto;
            flex-shrink: 0;
            z-index: 10;
            background: var(--color-surface-2);
            border-top: 1px solid var(--color-border);
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
            padding: var(--space-4) var(--space-4) clamp(var(--space-4), 3.5vh, var(--space-6));
            display: flex;
            flex-direction: column;
            gap: clamp(var(--space-3), 2.5vh, var(--space-5));
        }

        /* NUMBER BAR */
        .number-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: clamp(48px, 9vh, 62px);
            background: var(--color-bg);
            border: 1.5px solid var(--color-divider);
            border-radius: var(--radius-xl);
            padding: var(--space-2) var(--space-4);
            font-size: clamp(1.3rem, 5vw, 1.75rem);
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: 0.06em;
            overflow: hidden;
            white-space: nowrap;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .number-bar.has-number {
            border-color: var(--color-brand-from);
            box-shadow: 0 0 0 3px oklch(from #667eea l c h / 0.10);
        }

        .number-bar .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--color-brand-from);
            border-radius: 2px;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* KEYPAD */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(var(--space-2), 2.5vw, var(--space-4));
        }

        .key {
            aspect-ratio: 1;
            max-width: 80px;
            max-height: 80px;
            width: 100%;
            margin: 0 auto;
            background: var(--color-key-bg);
            border-radius: var(--radius-full);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1px;
            cursor: pointer;
            user-select: none;
            box-shadow: var(--shadow-key);
            border: 1px solid oklch(from #667eea l c h / 0.08);
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .key:hover {
            background: var(--color-key-hover);
            box-shadow: 0 4px 12px oklch(0.25 0.08 280 / 0.15);
        }

        .key:active {
            background: var(--color-key-active);
            transform: scale(0.91);
            box-shadow: none;
        }

        .key-digit {
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            font-weight: 700;
            color: var(--color-text);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-alpha {
            font-size: clamp(0.45rem, 1.5vw, 0.6rem);
            font-weight: 600;
            color: var(--color-text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
        }

        /* ACTION ROW */
        .action-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(var(--space-8), 12vw, var(--space-10));
        }

        .call-btn {
            width: clamp(60px, 16vw, 72px);
            height: clamp(60px, 16vw, 72px);
            border-radius: var(--radius-full);
            background: var(--color-call);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 0 var(--color-call-ring), var(--shadow-btn);
            transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
        }

        .call-btn:hover {
            background: var(--color-call-hover);
            transform: scale(1.06);
            box-shadow: 0 0 0 6px var(--color-call-ring), var(--shadow-btn);
        }

        .call-btn:active {
            transform: scale(0.94);
        }

        .call-btn svg {
            width: clamp(24px, 6vw, 30px);
            height: clamp(24px, 6vw, 30px);
        }

        .del-btn {
            width: clamp(52px, 14vw, 62px);
            height: clamp(52px, 14vw, 62px);
            border-radius: var(--radius-full);
            background: var(--color-del);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid oklch(from #667eea l c h / 0.08);
            box-shadow: var(--shadow-key);
            transition: background var(--transition), transform var(--transition);
        }

        .del-btn:hover {
            background: var(--color-del-hover);
        }

        .del-btn:active {
            transform: scale(0.92);
            background: var(--color-key-active);
        }

        .del-btn svg {
            width: clamp(20px, 5vw, 26px);
            height: clamp(20px, 5vw, 26px);
        }

        /* CALL SCREEN */
        #callScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .call-screen-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: clamp(var(--space-5), 5vh, var(--space-8)) var(--space-5);
            width: 100%;
        }

        .call-avatar {
            width: clamp(90px, 22vw, 120px);
            height: clamp(90px, 22vw, 120px);
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--color-brand-from), var(--color-brand-to));
            color: white;
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 10px oklch(from #667eea l c h / 0.10), var(--shadow-btn);
        }

        .call-name {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: 700;
            color: var(--color-text);
        }

        .call-status {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            font-weight: 500;
            margin-top: var(--space-1);
        }

        .call-actions {
            display: flex;
            gap: clamp(var(--space-5), 8vw, var(--space-8));
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-2);
        }

        .action-circle {
            width: clamp(52px, 14vw, 64px);
            height: clamp(52px, 14vw, 64px);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition), background var(--transition);
        }

        .action-circle:hover {
            transform: scale(1.08);
        }

        .action-circle:active {
            transform: scale(0.92);
        }

        .action-circle.mute {
            background: var(--color-key-bg);
        }

        .action-circle.speaker {
            background: var(--color-key-bg);
        }

        .action-circle.end {
            background: #ef4444;
            box-shadow: 0 4px 16px oklch(from #ef4444 l c h / 0.35);
        }

        .action-circle svg {
            width: clamp(20px, 5vw, 26px);
            height: clamp(20px, 5vw, 26px);
        }

        .action-circle.end svg {
            color: white;
        }

        .action-label {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            font-weight: 500;
        }

        /* INCOMING CALL */
        .incoming-box {
            display: none;
            position: fixed;
            bottom: clamp(var(--space-4), 3vh, var(--space-6));
            right: clamp(var(--space-4), 3vw, var(--space-6));
            background: #1e1b2e;
            color: white;
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-xl);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            z-index: 200;
            min-width: 200px;
            max-width: 90vw;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        #incoming {
            z-index: 999999;
        }

        .incoming-label {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: var(--space-1);
        }

        .incoming-num {
            font-size: var(--text-base);
            font-weight: 700;
        }

        .incoming-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
        }

        .inc-btn {
            flex: 1;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            transition: transform var(--transition);
        }

        .inc-btn:active {
            transform: scale(0.96);
        }

        .inc-btn.accept {
            background: var(--color-call);
            color: white;
        }

        .inc-btn.reject {
            background: #ef4444;
            color: white;
        }


        @media (max-height: 620px) {
            .history {
                max-height: 55px;
            }

            .dialer-bottom {
                gap: var(--space-2);
                padding: var(--space-3) var(--space-4);
            }

            .number-bar {
                min-height: 40px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 340px) {
            .key {
                max-width: 66px;
            }
        }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <div id="login">
        <h2>Phone Login</h2>
        <div class="login-box">
            <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10" inputmode="numeric"
                enterkeyhint="done" autofocus>
            <button class="login-btn" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otpBox" class="hidden">
            <input type="tel" id="otp" placeholder="Enter OTP" inputmode="numeric" enterkeyhint="done"
                autocomplete="one-time-code" autofocus>
            <button class="login-btn" onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>
        <p id="msg"></p>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="container">
            <!-- Sidebar -->
            <div class="header">
                <h2>DialBridge</h2>
                <p id="userLabel"></p>
                <div style="position:absolute; left:15px; top:15px;">
                    <button onclick="logout()" style="
        padding:6px 10px;
        border-radius:8px;
        background:#ef4444;
        color:white;
        font-size:12px;
        font-weight:600;
    ">
                        Logout
                    </button>
                </div>
            </div>

            <!-- Main -->
            <div class="main">
                <!-- Dialer -->
                <div id="dialer" class="card">
                    <div class="tab-switch">
                        <label>
                            <input type="radio" name="tab" value="dialpad" checked onclick="switchTab('dialpad')">
                            Dialpad
                        </label>
                        <label>
                            <input type="radio" name="tab" value="history" onclick="switchTab('history')">
                            Recent
                        </label>
                    </div>
                    <!-- CALL HISTORY -->
                    <!-- History (scrollable) -->
                    <div class="history" id="historySection">
                        <div class="history-header">Recent</div>
                        <div class="history-list" id="historyList">
                            <div class="history-empty">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5">
                                    <path
                                        d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
                                </svg>
                                <p>No recent calls</p>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom: display + keypad + actions -->
                    <div class="dialer-bottom" id="dialpadSection">

                        <!-- Number display bar -->
                        <div id="number" class="number-bar">
                            <span id="numberText"></span>
                            <span class="cursor" id="cursor" style="display:none"></span>
                        </div>

                        <!-- Keypad -->
                        <div class="keypad">
                            <div class="key" onclick="press('1')"><span class="key-digit">1</span><span

    <!-- ======== SCRIPTS ======== -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module">
        // ===== IMPORTS =====

        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyAoA3skXYt00nNcV1efQx6aHtZtAhZ5ZqI",
            authDomain: "dialbridge-972c9.firebaseapp.com",
            projectId: "dialbridge-972c9",
            appId: "1:112453752302:web:180ceeb4b00997cfa7eaff"
        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);

        const rtdb = getDatabase(app);

        // ===== STORAGE =====
        const Store = {
            setItem: (k, v) => localStorage.setItem(k, v),

            getItem: (k) => localStorage.getItem(k),

            removeItem: (k) => localStorage.removeItem(k)
        };

        // ===== GLOBAL STATE =====
        let socket;

        let myNumber;

        let currentCallUser;

        let caller;

        let number = "";

        let peer;

        let localStream;

        let iceQueue = [];

        let isRemoteSet = false;

        let callStartTime;

        let callSeconds = 0;

        let callTimerInterval;

        let CALL_STATE = "IDLE";

        window.sessionId = crypto.randomUUID();

        // ===== ICE SERVERS =====
        const ICE_SERVERS = [
            {
                urls: "stun:stun.relay.metered.ca:80",
            },
            {
                urls: "turn:global.relay.metered.ca:80",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turn:global.relay.metered.ca:80?transport=tcp",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turn:global.relay.metered.ca:443",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            },
            {
                urls: "turns:global.relay.metered.ca:443?transport=tcp",
                username: "7fc97edb451242b1e45aeddf",
                credential: "vT7VrVzMo+z+EFza",
            }
        ];

        // ===== HELPERS =====
        function normalize(num) {

            if (!num) return null;

            let digits = num.toString().replace(/\D/g, "");

            if (digits.startsWith("91") && digits.length > 10) {
                digits = digits.slice(-10);
            }

            if (digits.length !== 10) return null;

            return "+91" + digits;
        }

        function formatNumber(num) {

            const n = normalize(num);

            return n
                ? n.replace("+91", "+91 ")
                : "";
        }

        function formatTime(sec) {

            const m = Math.floor(sec / 60);

            const s = sec % 60;

            return `${m}:${s < 10 ? "0" : ""}${s}`;
        }

        // ===== UI =====
        function updateDisplay() {

            const text = document.getElementById("numberText");

            const cursor = document.getElementById("cursor");

            const bar = document.getElementById("number");

            if (number.length > 0) {

                text.innerText = "+91 " + number;

                cursor.style.display = "inline-block";

                bar.classList.add("has-number");

            } else {

                text.innerText = "";

                cursor.style.display = "none";

                bar.classList.remove("has-number");
            }
        }

        function showCallScreen(status) {

            document.getElementById("dialer").style.display = "none";

            document.getElementById("callScreen").style.display = "flex";

            document.getElementById("status").innerText = status;

            document.getElementById("callUser").innerText =
                formatNumber(currentCallUser);

            document.getElementById("callAvatar").innerText = "📞";
        }

        function resetUI() {

            document.getElementById("dialer").style.display = "flex";

            document.getElementById("callScreen").style.display = "none";

            number = "";

            updateDisplay();
        }

        window.switchTab = (tab) => {

            const history =
                document.getElementById("historySection");

            const dialpad =
                document.getElementById("dialpadSection");

            if (tab === "history") {

                history.style.display = "block";

                dialpad.style.display = "none";

            } else {

                history.style.display = "none";

                dialpad.style.display = "flex";
            }
        };

        // ===== LOGIN =====
        window.sendOTP = () => {

            let phone =
                document.getElementById("phone")
                    .value
                    .trim()
                    .replace(/\D/g, "");

            const msg =
                document.getElementById("msg");

            if (phone.length !== 10) {

                msg.innerText =
                    "Enter valid 10-digit number";

                msg.className = "error";

                return;
            }

            Store.setItem(
                "tempPhone",
                normalize(phone)
            );

            document.querySelector(".login-box")
                .classList.add("hidden");

            document.getElementById("otpBox")
                .classList.remove("hidden");

            msg.innerText = "OTP sent";

            msg.className = "success";

            setTimeout(() => {
                document.getElementById("otp").focus();
            }, 200);
        };

        window.verifyOTP = async () => {

            const otp =
                document.getElementById("otp").value;

            const msg =
                document.getElementById("msg");

            if (otp !== "123456") {

                msg.innerText = "Invalid OTP";

                msg.className = "error";

                return;
            }

            myNumber =
                normalize(
                    Store.getItem("tempPhone")
                );

            Store.setItem(
                "userNumber",
                myNumber
            );

            msg.innerText = "Login Successful";

            msg.className = "success";

            setTimeout(() => {
                startApp();
            }, 500);
        };

        // ===== START APP =====
        async function startApp() {

            if (socket?.connected) return;

            myNumber =
                normalize(
                    myNumber ||
                    Store.getItem("userNumber")
                );

            document.getElementById("login")
                .style.display = "none";

            document.getElementById("app")
                .style.display = "block";

            document.getElementById("userLabel")
                .innerText =
                "You: " + formatNumber(myNumber);

            switchTab("dialpad");

            loadCallHistory(myNumber);

            const userRef =
                ref(rtdb, "status/" + myNumber);

            onValue(userRef, (snap) => {

                const data = snap.val();

                if (!data) return;

                if (!socket?.connected) return;

                if (
                    data.sessionId &&
                    data.sessionId !== window.sessionId &&
                    data.online === true
                ) {

                    alert(
                        "Logged in on another device"
                    );

                    try {
                        socket.disconnect();
                    } catch (e) { }

                    Store.removeItem("userNumber");

                    location.reload();
                }
            });

            socket = io(
                "https://dialbridge.onrender.com",
                {
                    query: {
                        userId: myNumber,
                        sessionId: window.sessionId
                    },

                    transports: [
                        "websocket",
                        "polling"
                    ]
                }
            );

            const statusRef = ref(rtdb, "status/" + myNumber);

            await update(statusRef, {
                online: true,
                socketId: socket.id,
                sessionId: window.sessionId,
                lastSeen: Date.now()
            });

            onDisconnect(statusRef).update({
                online: false,
                socketId: null,
                lastSeen: Date.now()
            });

            socket.on("connect", async () => {
                await update(
                    ref(rtdb, "status/" + myNumber),
                    {
                        online: true,
                        socketId: socket.id,
                        sessionId: window.sessionId,
                        lastSeen: Date.now()
                    }
                );
            });

            setupSocketEvents();
            updateDisplay();
        }

        // ===== LOGOUT =====
        window.logout = async () => {
            try {
                if (!myNumber) {
                    Store.removeItem("userNumber");
                    location.reload();
                    return;
                }

                // update realtime db status
                await update(ref(rtdb, "status/" + normalize(myNumber)), {
                    online: false,
                    socketId: null,
                    sessionId: null,
                    lastSeen: Date.now()
                });

                // disconnect socket
                if (socket?.connected) {
                    socket.disconnect();
                }

                // clear storage
                Store.removeItem("userNumber");
                Store.removeItem("tempPhone");

                // reload app
                location.reload();

            } catch (err) {
                console.error("Logout Error:", err);
            }
        };

        // ===== SOCKET EVENTS =====
        function setupSocketEvents() {

            socket.on("incoming-call", (data) => {
                if (CALL_STATE !== "IDLE") {
                    socket.emit("call-rejected", {
                        to: data.from,
                        reason: "busy"
                    });
                    return;
                }

                CALL_STATE = "RINGING";
                caller = normalize(data.from);
                currentCallUser = normalize(data.from);

                document.getElementById("incomingNum").innerText = formatNumber(currentCallUser);
                document.getElementById("incoming").style.display = "flex";
            });

            socket.on("call-accepted", async () => {

                CALL_STATE = "IN_CALL";

                showCallScreen("Connecting...");

                await startWebRTC(true);
            });

            socket.on("call-rejected", () => {

                document.getElementById("status")
                    .innerText =
                    "Call Rejected";

                setTimeout(() => {
                    resetUI();
                }, 1500);
            });

            socket.on("offer", async (offer) => {
                await handleOffer(offer);
            });

            socket.on("answer", async (answer) => {
                await handleAnswer(answer);
            });

            socket.on("ice-candidate", async (candidate) => {

                const ice =
                    new RTCIceCandidate(candidate);

                if (isRemoteSet) {

                    await peer.addIceCandidate(ice);

                } else {

                    iceQueue.push(ice);
                }
            });

            socket.on("call-ended", () => {

                document.getElementById("status")
                    .innerText =
                    "Call Ended";

                cleanupCall();

                stopTimer();

                CALL_STATE = "IDLE";

                setTimeout(() => {
                    resetUI();
                }, 1000);
            });

            socket.on("user-offline", () => {

                document.getElementById("status")
                    .innerText =
                    "User Offline";

                setTimeout(() => {
                    resetUI();
                }, 1500);
            });

            socket.on("force-logout", () => {

                alert(
                    "Logged in on another device"
                );

                Store.removeItem("userNumber");

                socket.disconnect();

                location.reload();
            });
        }

        // ===== DIALPAD =====
        window.press = (digit) => {

            if (number.length >= 10) return;

            number += digit;

            updateDisplay();
        };

        window.removeNumber = () => {

            if (!number.length) return;

            number =
                number.slice(0, -1);

            updateDisplay();
        };

        const deleteBtn =
            document.getElementById("deleteBtn");

        let holdTimer;

        deleteBtn.addEventListener(
            "pointerdown",
            (e) => {

                e.preventDefault();

                holdTimer = setTimeout(() => {

                    number = "";

                    updateDisplay();

                }, 500);
            }
        );

        deleteBtn.addEventListener(
            "pointerup",
            () => {
                clearTimeout(holdTimer);
            }
        );

        // ===== CALL =====
        window.makeCall = async () => {

            if (!socket?.connected) {

                alert(
                    "Connecting to server..."
                );

                return;
            }

            if (!number) return;

            if (CALL_STATE !== "IDLE") return;

            const target =
                normalize(number);

            if (!target) {

                alert("Invalid number");

                return;
            }

            try {

                const snap =
                    await get(
                        ref(
                            rtdb,
                            "status/" + target
                        )
                    );

                const data = snap.val();

                if (!snap.exists()) {

                    alert(
                        "User not registered"
                    );

                    return;
                }

                if (!data?.online) {

                    alert(
                        "User offline"
                    );

                    return;
                }

                currentCallUser = target;

                CALL_STATE = "CALLING";

                callStartTime = Date.now();

                showCallScreen("Calling...");

                socket.emit("call-user", {
                    to: currentCallUser,
                    from: myNumber
                });

            } catch (err) {

                console.error(err);

                alert("Call failed");
            }
        };

        window.acceptCall = async () => {

            document.getElementById("incoming")
                .style.display = "none";

            currentCallUser =
                normalize(caller);

            CALL_STATE = "IN_CALL";

            showCallScreen("Connecting...");

            socket.emit("call-accepted", {
                to: currentCallUser
            });

            await startWebRTC(false);
        };

        window.rejectCall = () => {

            document.getElementById("incoming")
                .style.display = "none";

            socket.emit("call-rejected", {
                to: normalize(caller)
            });

            CALL_STATE = "IDLE";

            caller = null;

            currentCallUser = null;
        };

        window.endCall = async () => {

            socket.emit("end-call", {
                to: normalize(currentCallUser)
            });

            const duration =
                callStartTime
                    ? Math.floor(
                        (Date.now() - callStartTime) / 1000
                    )
                    : 0;

            await saveCallLog(
                myNumber,
                currentCallUser,
                duration
            );

            cleanupCall();

            stopTimer();

            resetUI();

            CALL_STATE = "IDLE";
        };

        // ===== WEBRTC =====
        async function startWebRTC(isCaller) {

            if (peer) {
                cleanupCall();
            }

            peer =
                new RTCPeerConnection({
                    iceServers: ICE_SERVERS
                });

            try {

                localStream =
                    await navigator.mediaDevices
                        .getUserMedia({
                            audio: true
                        });

            } catch (err) {

                alert(
                    "Microphone permission denied"
                );

                return;
            }

            localStream.getTracks()
                .forEach(track => {
                    peer.addTrack(track, localStream);
                });

            peer.ontrack = (event) => {

                const audio =
                    document.getElementById(
                        "remoteAudio"
                    );

                audio.srcObject =
                    event.streams[0];

                audio.play().catch(() => { });
            };

            peer.onicecandidate = (event) => {

                if (event.candidate) {

                    socket.emit(
                        "ice-candidate",
                        {
                            to:
                                normalize(
                                    currentCallUser
                                ),

                            candidate:
                                event.candidate
                        }
                    );
                }
            };

            peer.onconnectionstatechange = () => {

                if (
                    peer.connectionState ===
                    "connected"
                ) {

                    callStartTime =
                        Date.now();

                    startTimer();
                }

                if (
                    CALL_STATE === "IN_CALL" &&
                    (
                        peer.connectionState ===
                        "failed"
                        ||
                        peer.connectionState ===
                        "disconnected"
                    )
                ) {

                    endCall();
                }
            };

            if (isCaller) {

                const offer =
                    await peer.createOffer();

                await peer.setLocalDescription(
                    offer
                );

                socket.emit("offer", {
                    to:
                        normalize(
                            currentCallUser
                        ),

                    offer
                });
            }
        }

        async function handleOffer(offer) {

            if (!peer) {
                await startWebRTC(false);
            }

            await peer.setRemoteDescription(
                new RTCSessionDescription(
                    offer
                )
            );

            isRemoteSet = true;

            for (const ice of iceQueue) {
                await peer.addIceCandidate(ice);
            }

            iceQueue = [];

            const answer =
                await peer.createAnswer();

            await peer.setLocalDescription(
                answer
            );

            socket.emit("answer", {
                to:
                    normalize(
                        currentCallUser
                    ),

                answer
            });
        }

        async function handleAnswer(answer) {

            await peer.setRemoteDescription(
                new RTCSessionDescription(
                    answer
                )
            );

            isRemoteSet = true;

            for (const ice of iceQueue) {
                await peer.addIceCandidate(ice);
            }

            iceQueue = [];
        }

        function cleanupCall() {

            if (peer) {

                peer.close();

                peer = null;
            }

            if (localStream) {

                localStream.getTracks()
                    .forEach(track => {
                        track.stop();
                    });
            }

            localStream = null;

            iceQueue = [];

            isRemoteSet = false;

            currentCallUser = null;

            caller = null;
        }

        // ===== TIMER =====
        function startTimer() {

            callSeconds = 0;

            callTimerInterval =
                setInterval(() => {

                    callSeconds++;

                    document.getElementById(
                        "status"
                    ).innerText =
                        formatTime(callSeconds);

                }, 1000);
        }

        function stopTimer() {

            clearInterval(callTimerInterval);

            callSeconds = 0;
        }

        // ===== HISTORY =====
        async function loadCallHistory(userNumber) {

            const q = query(
                collection(db, "call_logs"),
                where(
                    "participants",
                    "array-contains",
                    userNumber
                )
            );

            onSnapshot(q, (snap) => {

                const historyHTML = [];

                snap.forEach(doc => {

                    const data = doc.data();

                    const outgoing =
                        data.caller === userNumber;

                    historyHTML.push({
                        num:
                            normalize(
                                outgoing
                                    ? data.receiver
                                    : data.caller
                            ),

                        dur: data.duration,

                        type:
                            outgoing
                                ? "out"
                                : "in",

                        ts:
                            data.timestamp?.toDate()
                    });
                });

                historyHTML.sort(
                    (a, b) => b.ts - a.ts
                );

                const list =
                    document.getElementById(
                        "historyList"
                    );

                if (!historyHTML.length) {

                    list.innerHTML = `
<div class="history-empty">
<p>No recent calls</p>
</div>
`;

                    return;
                }

                list.innerHTML =
                    historyHTML.map(item => {

                        const time =
                            item.ts
                                ? new Date(
                                    item.ts
                                ).toLocaleTimeString()
                                : "Just now";

                        return `
<div class="history-item"
onclick="dialFromHistory('${item.num}')">

<div class="history-icon ${item.type}">
${item.type === "out" ? "↗" : "↙"}
</div>

<div class="history-info">

<div class="history-num">
${formatNumber(item.num)}
</div>

<div class="history-dur">
${item.dur}s • ${time}
</div>

</div>

</div>
`;

                    }).join("");
            });
        }

        window.dialFromHistory = (num) => {

            number =
                normalize(num)
                    .replace("+91", "");

            updateDisplay();

            switchTab("dialpad");

            document.querySelector(
                "input[value='dialpad']"
            ).checked = true;
        };

        // ===== SAVE CALL LOG =====
        async function saveCallLog(
            caller,
            receiver,
            duration
        ) {

            await addDoc(
                collection(db, "call_logs"),
                {
                    caller:
                        normalize(caller),

                    receiver:
                        normalize(receiver),

                    participants: [
                        normalize(caller),
                        normalize(receiver)
                    ],

                    duration,

                    timestamp:
                        serverTimestamp()
                }
            );
        }

        // ===== INIT =====
        window.onload = () => {

            const savedUser =
                Store.getItem("userNumber");

            if (savedUser) {

                myNumber = savedUser;

                startApp();

                return;
            }

            const phoneInput =
                document.getElementById(
                    "phone"
                );

            setTimeout(() => {
                phoneInput.focus();
            }, 300);

            document.getElementById("phone")
                .addEventListener(
                    "keydown",
                    (e) => {

                        if (e.key === "Enter") {
                            sendOTP();
                        }
                    }
                );

            document.getElementById("otp")
                .addEventListener(
                    "keydown",
                    (e) => {

                        if (e.key === "Enter") {
                            verifyOTP();
                        }
                    }
                );
        };
    </script>

</body>

</html>
