<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DialBridge</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- LOGIN -->
    <div id="login">
        <h2>Phone Login</h2>
        <div class="login-box">
            <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10" inputmode="numeric"
                autofocus>
            <button class="login-btn" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otpBox" class="hidden">
            <div class="otp-demo-box">
                Development Mode: Use OTP <b>123456</b>
            </div>
            <input type="tel" id="otp" placeholder="Enter OTP" inputmode="numeric" autocomplete="one-time-code"
                autofocus>
            <button class="login-btn" onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>
        <p id="msg"></p>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="container">
            <!-- Sidebar -->
            <div class="header">
                <h2>DialBridge</h2>
                <p id="userLabel"></p>
                <div style="position:absolute; left:15px; top:15px;">
                    <button onclick="logout()" style="
        padding:6px 10px;
        border-radius:8px;
        background:#ef4444;
        color:white;
        font-size:12px;
        font-weight:600;
    ">
                        Logout
                    </button>
                </div>
            </div>

            <!-- Main -->
            <div class="main">
                <!-- Dialer -->
                <div id="dialer" class="card">
                    <div class="tab-switch">
                        <label>
                            <input type="radio" name="tab" value="dialpad" checked onclick="switchTab('dialpad')">
                            Dialpad
                        </label>
                        <label>
                            <input type="radio" name="tab" value="history" onclick="switchTab('history')">
                            Recent
                        </label>
                    </div>
                    <!-- CALL HISTORY -->
                    <!-- History (scrollable) -->
                    <div class="history" id="historySection">
                        <div class="history-header">Recent</div>
                        <div class="history-list" id="historyList">
                            <div class="history-empty">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5">
                                    <path
                                        d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
                                </svg>
                                <p>No recent calls</p>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom: display + keypad + actions -->
                    <div class="dialer-bottom" id="dialpadSection">

                        <!-- Number display bar -->
                        <div id="number" class="number-bar">
                            <span id="numberText"></span>
                            <span class="cursor" id="cursor" style="display:none"></span>
                        </div>

                        <!-- Keypad -->
                        <div class="keypad">
                            <div class="key" onclick="press('1')"><span class="key-digit">1</span><span
                                    class="key-alpha">&nbsp;</span></div>
                            <div class="key" onclick="press('2')"><span class="key-digit">2</span><span
                                    class="key-alpha">ABC</span></div>
                            <div class="key" onclick="press('3')"><span class="key-digit">3</span><span
                                    class="key-alpha">DEF</span></div>
                            <div class="key" onclick="press('4')"><span class="key-digit">4</span><span
                                    class="key-alpha">GHI</span></div>
                            <div class="key" onclick="press('5')"><span class="key-digit">5</span><span
                                    class="key-alpha">JKL</span></div>
                            <div class="key" onclick="press('6')"><span class="key-digit">6</span><span
                                    class="key-alpha">MNO</span></div>
                            <div class="key" onclick="press('7')"><span class="key-digit">7</span><span
                                    class="key-alpha">PQRS</span></div>
                            <div class="key" onclick="press('8')"><span class="key-digit">8</span><span
                                    class="key-alpha">TUV</span></div>
                            <div class="key" onclick="press('9')"><span class="key-digit">9</span><span
                                    class="key-alpha">WXYZ</span></div>
                            <div class="key" onclick="press('*')"><span class="key-digit">*</span><span
                                    class="key-alpha">&nbsp;</span></div>
                            <div class="key" onclick="press('0')"><span class="key-digit">0</span><span
                                    class="key-alpha">+</span></div>
                            <div class="key" onclick="press('#')"><span class="key-digit">#</span><span
                                    class="key-alpha">&nbsp;</span></div>
                        </div>

                        <!-- Call + Delete -->
                        <div class="action-row">
                            <!-- Delete -->
                            <button class="del-btn" id="deleteBtn" aria-label="Delete digit">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    style="color:var(--color-text-muted)">
                                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z" />
                                    <line x1="18" y1="9" x2="13" y2="14" />
                                    <line x1="13" y1="9" x2="18" y2="14" />
                                </svg>
                            </button>

                            <!-- Call -->
                            <button class="call-btn" onclick="makeCall()" aria-label="Make call">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
                                </svg>
                            </button>
                        </div>

                    </div>
                </div>

                <!-- CALL SCREEN -->
                <div id="callScreen" class="card call-screen-inner">
                    <div class="call-avatar-wrap">
                        <div class="avatar-ring"></div>
                        <div class="call-avatar" id="callAvatar">
                            <div class="avatar-glow"></div>
                            <div class="avatar-shine"></div>
                            <div class="avatar-pattern"></div>
                            <div class="avatar-icon" id="avatarLetter">
                                📞
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="call-name" id="callUser"></div>
                        <div class="call-status" id="status">Ringing...</div>
                        <div id="remoteMuteIndicator"
                            style="margin-top:10px; padding:8px 12px; background:#ef4444; color:white; border-radius:10px; font-size:13px; font-weight:600; display:none; ">
                            Microphone muted</div>
                    </div>
                    <div class="call-actions">
                        <div class="action-btn">
                            <button id="muteBtn" class="action-circle mute" onclick="toggleMute()" aria-label="Mute">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    style="color:var(--color-text-muted)">
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                    <path
                                        d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23M12 20v4M8 20h8" />
                                </svg>
                            </button>
                            <span class="action-label">Mute</span>
                        </div>
                        <div class="action-btn">
                            <button class="action-circle end" onclick="endCall()" aria-label="End call">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px">
                                    <path
                                        d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.42 19.42 0 01-3.33-2.67m-2.67-3.34a19.79 19.79 0 01-3.07-8.63A2 2 0 014 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91M23 1L1 23" />
                                </svg>
                            </button>
                            <span class="action-label">End</span>
                        </div>
                        <div class="action-btn">
                            <button id="speakerBtn" class="action-circle speaker" onclick="toggleSpeaker()"
                                aria-label="Speaker">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    style="color:var(--color-text-muted)">
                                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                                    <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" />
                                </svg>
                            </button>
                            <span class="action-label">Speaker</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Incoming call -->
        <div id="incoming" class="incoming-box">
            <div class="incoming-label">Incoming call</div>
            <div class="incoming-num" id="incomingNum"></div>
            <div class="incoming-actions">
                <button class="inc-btn reject" onclick="rejectCall()">Decline</button>
                <button class="inc-btn accept" onclick="acceptCall()">Accept</button>
            </div>
        </div>

        <audio id="remoteAudio" autoplay playsinline webkit-playsinline controls style="display:none">
        </audio>
    </div>

    <!-- ======== SCRIPTS ======== -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
